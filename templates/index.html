<!-- ================= templates/index.html ================= -->
{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto mt-12">
    <div class="bg-surface border border-outline-variant rounded-xl p-8 shadow-sm">
        <div class="text-center mb-8">
            <h1 class="text-headline-md font-headline-md text-on-surface mb-2">Drug Repurposing Search</h1>
            <p class="text-body-md text-on-surface-variant">Enter a drug name to retrieve clinical, molecular, and repurposing evidence.</p>
        </div>
        <form action="/search" method="POST" class="flex flex-col sm:flex-row gap-4">
            <div class="flex-1">
                <input type="text" name="query" required placeholder="e.g., Nintedanib, Pirfenidone, Sildenafil"
                       class="w-full px-4 py-3 bg-surface border border-outline rounded-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition text-body-md">
            </div>
            <button type="submit" class="px-6 py-3 bg-primary-container text-on-primary-container font-label-md rounded-lg flex items-center justify-center gap-2 hover:opacity-90 transition">
                <span class="material-symbols-outlined text-sm">search</span> Analyze Drug
            </button>
        </form>
        <div class="mt-8 pt-6 border-t border-outline-variant text-center text-label-md text-on-surface-variant">
            <span class="material-symbols-outlined text-sm align-middle mr-1">verified</span> Powered by PubChem, ChEMBL, Open Targets & ClinicalTrials.gov
        </div>
    </div>
</div>
{% endblock %}
